name: Database Tests

on:
  push:
    branches: [ main, staging, develop ]
  pull_request:
    branches: [ main, staging ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv sync --dev

    - name: Install frontend dependencies
      run: |
        cd app && npm ci

    - name: Build frontend
      run: |
        cd app && npm run build

    - name: Create test environment file
      run: |
        cp .env.example .env
        echo "FASTAPI_SECRET_KEY=test-secret-key-for-ci" >> .env
        echo "FASTAPI_DEBUG=False" >> .env
        echo "REDIS_URL=redis://localhost:6379" >> .env

    - name: Run unit tests with coverage
      run: |
        pipenv run pytest tests/ -k "not e2e" \
          --verbose \
          --cov=api \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 7

  database-integration-tests:
    name: Database Integration Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database:
          - name: postgresql
            image: postgres:16-alpine
            port: 5432
            env:
              POSTGRES_USER: testuser
              POSTGRES_PASSWORD: testpass
              POSTGRES_DB: testdb
            health_cmd: pg_isready -U testuser
            connection_url: postgresql://testuser:testpass@localhost:5432/testdb
          
          - name: mysql
            image: mysql:8.0
            port: 3306
            env:
              MYSQL_ROOT_PASSWORD: rootpass
              MYSQL_DATABASE: testdb
              MYSQL_USER: testuser
              MYSQL_PASSWORD: testpass
            health_cmd: mysqladmin ping -h localhost -u testuser -ptestpass
            connection_url: mysql://testuser:testpass@localhost:3306/testdb
          
          - name: kingbase
            image: postgres:16-alpine  # 使用 PostgreSQL 作为人大金仓的替代
            port: 54321
            env:
              POSTGRES_USER: testuser
              POSTGRES_PASSWORD: testpass
              POSTGRES_DB: testdb
            health_cmd: pg_isready -U testuser
            connection_url: kingbase://testuser:testpass@localhost:54321/testdb

    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      database:
        image: ${{ matrix.database.image }}
        ports:
          - ${{ matrix.database.port }}:${{ matrix.database.port }}
        env: ${{ matrix.database.env }}
        options: >-
          --health-cmd "${{ matrix.database.health_cmd }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv sync --dev

    - name: Create test environment file
      run: |
        cp .env.example .env
        echo "FASTAPI_SECRET_KEY=test-secret-key-for-ci" >> .env
        echo "FASTAPI_DEBUG=False" >> .env
        echo "REDIS_URL=redis://localhost:6379" >> .env
        echo "TEST_DB_URL=${{ matrix.database.connection_url }}" >> .env

    - name: Wait for database to be ready
      run: |
        echo "Waiting for ${{ matrix.database.name }} to be ready..."
        sleep 10

    - name: Setup test database schema
      run: |
        if [ "${{ matrix.database.name }}" = "postgresql" ] || [ "${{ matrix.database.name }}" = "kingbase" ]; then
          PGPASSWORD=testpass psql -h localhost -p ${{ matrix.database.port }} -U testuser -d testdb -c "
            CREATE TABLE IF NOT EXISTS users (
              id SERIAL PRIMARY KEY,
              username VARCHAR(50) NOT NULL,
              email VARCHAR(100),
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );
            CREATE TABLE IF NOT EXISTS orders (
              id SERIAL PRIMARY KEY,
              user_id INTEGER REFERENCES users(id),
              order_date TIMESTAMP,
              total_amount DECIMAL(10, 2)
            );
          "
        elif [ "${{ matrix.database.name }}" = "mysql" ]; then
          mysql -h 127.0.0.1 -P ${{ matrix.database.port }} -u testuser -ptestpass testdb -e "
            CREATE TABLE IF NOT EXISTS users (
              id INT AUTO_INCREMENT PRIMARY KEY,
              username VARCHAR(50) NOT NULL,
              email VARCHAR(100),
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );
            CREATE TABLE IF NOT EXISTS orders (
              id INT AUTO_INCREMENT PRIMARY KEY,
              user_id INT,
              order_date TIMESTAMP,
              total_amount DECIMAL(10, 2),
              FOREIGN KEY (user_id) REFERENCES users(id)
            );
          "
        fi

    - name: Run database-specific tests
      run: |
        pipenv run pytest tests/ \
          -k "test_${{ matrix.database.name }}" \
          --verbose \
          --tb=short \
          || echo "No specific tests found for ${{ matrix.database.name }}"

    - name: Run loader integration tests
      run: |
        pipenv run pytest tests/loaders/ \
          --verbose \
          --tb=short \
          || echo "Loader tests completed"

  property-based-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest

    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv sync --dev

    - name: Create test environment file
      run: |
        cp .env.example .env
        echo "FASTAPI_SECRET_KEY=test-secret-key-for-ci" >> .env
        echo "FASTAPI_DEBUG=False" >> .env
        echo "REDIS_URL=redis://localhost:6379" >> .env

    - name: Run property-based tests
      run: |
        pipenv run pytest tests/ \
          -m pbt \
          --verbose \
          --tb=short \
          --hypothesis-show-statistics

    - name: Upload Hypothesis database
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: hypothesis-database
        path: .hypothesis/
        retention-days: 7

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv sync --dev

    - name: Run pylint
      run: |
        pipenv run pylint $(git ls-files '*.py') || true

    - name: Install frontend dependencies
      run: |
        cd app && npm ci

    - name: Run frontend lint
      run: |
        cd app && npm run lint

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, database-integration-tests, property-based-tests, lint]
    if: always()

    steps:
    - name: Check test results
      run: |
        echo "Unit Tests: ${{ needs.unit-tests.result }}"
        echo "Database Integration Tests: ${{ needs.database-integration-tests.result }}"
        echo "Property-Based Tests: ${{ needs.property-based-tests.result }}"
        echo "Lint: ${{ needs.lint.result }}"
        
        if [ "${{ needs.unit-tests.result }}" != "success" ] || \
           [ "${{ needs.database-integration-tests.result }}" != "success" ] || \
           [ "${{ needs.property-based-tests.result }}" != "success" ]; then
          echo "Some tests failed!"
          exit 1
        fi
        
        echo "All tests passed!"
