name: Coverage Report

# 代码覆盖率报告工作流
# 生成详细的代码覆盖率报告并上传到 Codecov

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest

    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv sync --dev

    - name: Install frontend dependencies
      run: |
        cd app && npm ci

    - name: Build frontend
      run: |
        cd app && npm run build

    - name: Create test environment file
      run: |
        cp .env.example .env
        echo "FASTAPI_SECRET_KEY=test-secret-key-for-ci" >> .env
        echo "FASTAPI_DEBUG=False" >> .env
        echo "REDIS_URL=redis://localhost:6379" >> .env
        echo "TEST_POSTGRES_URL=postgresql://testuser:testpass@localhost:5432/testdb" >> .env
        echo "TEST_MYSQL_URL=mysql://testuser:testpass@localhost:3306/testdb" >> .env

    - name: Setup test database schemas
      run: |
        # PostgreSQL 测试表
        PGPASSWORD=testpass psql -h localhost -U testuser -d testdb -c "
          CREATE TABLE IF NOT EXISTS users (
            id SERIAL PRIMARY KEY,
            username VARCHAR(50) NOT NULL,
            email VARCHAR(100),
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS orders (
            id SERIAL PRIMARY KEY,
            user_id INTEGER REFERENCES users(id),
            order_date TIMESTAMP,
            total_amount DECIMAL(10, 2)
          );
        "
        
        # MySQL 测试表
        mysql -h 127.0.0.1 -u testuser -ptestpass testdb -e "
          CREATE TABLE IF NOT EXISTS users (
            id INT AUTO_INCREMENT PRIMARY KEY,
            username VARCHAR(50) NOT NULL,
            email VARCHAR(100),
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS orders (
            id INT AUTO_INCREMENT PRIMARY KEY,
            user_id INT,
            order_date TIMESTAMP,
            total_amount DECIMAL(10, 2),
            FOREIGN KEY (user_id) REFERENCES users(id)
          );
        "

    - name: Run tests with coverage
      run: |
        pipenv run pytest tests/ \
          -k "not e2e" \
          --verbose \
          --cov=api \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --cov-report=json

    - name: Generate coverage badge
      run: |
        pipenv run python -c "
        import json
        with open('coverage.json') as f:
            data = json.load(f)
            coverage = data['totals']['percent_covered']
            print(f'总体覆盖率: {coverage:.2f}%')
            
            # 设置覆盖率颜色
            if coverage >= 80:
                color = 'brightgreen'
            elif coverage >= 60:
                color = 'yellow'
            else:
                color = 'red'
            
            print(f'覆盖率等级: {color}')
        "

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: all-tests
        name: full-coverage
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload HTML coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-html-report
        path: htmlcov/
        retention-days: 30

    - name: Upload JSON coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-json-report
        path: coverage.json
        retention-days: 30

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
        MINIMUM_GREEN: 80
        MINIMUM_ORANGE: 60

    - name: Check coverage threshold
      run: |
        pipenv run python -c "
        import json
        import sys
        
        with open('coverage.json') as f:
            data = json.load(f)
            coverage = data['totals']['percent_covered']
            
        print(f'当前覆盖率: {coverage:.2f}%')
        
        # 设置最低覆盖率阈值
        MINIMUM_COVERAGE = 70.0
        
        if coverage < MINIMUM_COVERAGE:
            print(f'❌ 覆盖率 {coverage:.2f}% 低于最低要求 {MINIMUM_COVERAGE}%')
            sys.exit(1)
        else:
            print(f'✅ 覆盖率 {coverage:.2f}% 达到要求')
        "

  coverage-diff:
    name: Coverage Diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv sync --dev

    - name: Create test environment file
      run: |
        cp .env.example .env
        echo "FASTAPI_SECRET_KEY=test-secret-key-for-ci" >> .env
        echo "REDIS_URL=redis://localhost:6379" >> .env

    - name: Run tests with coverage (PR)
      run: |
        pipenv run pytest tests/ -k "not e2e" \
          --cov=api \
          --cov-report=json:coverage-pr.json

    - name: Checkout base branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.base_ref }}

    - name: Run tests with coverage (Base)
      run: |
        pipenv run pytest tests/ -k "not e2e" \
          --cov=api \
          --cov-report=json:coverage-base.json

    - name: Compare coverage
      run: |
        pipenv run python -c "
        import json
        
        with open('coverage-pr.json') as f:
            pr_data = json.load(f)
            pr_coverage = pr_data['totals']['percent_covered']
        
        with open('coverage-base.json') as f:
            base_data = json.load(f)
            base_coverage = base_data['totals']['percent_covered']
        
        diff = pr_coverage - base_coverage
        
        print(f'基准分支覆盖率: {base_coverage:.2f}%')
        print(f'PR 分支覆盖率: {pr_coverage:.2f}%')
        print(f'覆盖率变化: {diff:+.2f}%')
        
        if diff < -1.0:
            print('⚠️ 警告：覆盖率下降超过 1%')
        elif diff > 0:
            print('✅ 覆盖率提升')
        else:
            print('➡️ 覆盖率基本持平')
        "
