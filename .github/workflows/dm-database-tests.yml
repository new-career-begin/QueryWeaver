name: DM Database Tests

# 达梦数据库专项测试工作流
# 由于达梦数据库没有官方 Docker 镜像，此工作流提供测试框架
# 实际测试需要在有达梦数据库环境的自托管 runner 上运行

on:
  push:
    branches: [ main, staging, develop ]
    paths:
      - 'api/loaders/dm_loader.py'
      - 'tests/loaders/test_dm_loader.py'
      - 'tests/property_tests/test_dm_properties.py'
  pull_request:
    branches: [ main, staging ]
    paths:
      - 'api/loaders/dm_loader.py'
      - 'tests/loaders/test_dm_loader.py'
      - 'tests/property_tests/test_dm_properties.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dm-unit-tests:
    name: DM Loader Unit Tests
    runs-on: ubuntu-latest

    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv sync --dev

    - name: Create test environment file
      run: |
        cp .env.example .env
        echo "FASTAPI_SECRET_KEY=test-secret-key-for-ci" >> .env
        echo "FASTAPI_DEBUG=False" >> .env
        echo "REDIS_URL=redis://localhost:6379" >> .env

    - name: Run DM loader unit tests
      run: |
        pipenv run pytest tests/loaders/test_dm_loader.py \
          --verbose \
          --tb=short \
          --cov=api/loaders/dm_loader \
          --cov-report=xml \
          --cov-report=term-missing

    - name: Upload coverage for DM loader
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: dm-loader
        name: dm-loader-coverage
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  dm-property-tests:
    name: DM Property-Based Tests
    runs-on: ubuntu-latest

    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv sync --dev

    - name: Create test environment file
      run: |
        cp .env.example .env
        echo "FASTAPI_SECRET_KEY=test-secret-key-for-ci" >> .env
        echo "FASTAPI_DEBUG=False" >> .env
        echo "REDIS_URL=redis://localhost:6379" >> .env

    - name: Run DM property-based tests
      run: |
        pipenv run pytest tests/property_tests/ \
          -k "dm" \
          -m pbt \
          --verbose \
          --tb=short \
          --hypothesis-show-statistics

    - name: Upload Hypothesis database
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dm-hypothesis-database
        path: .hypothesis/
        retention-days: 7

  dm-integration-tests-self-hosted:
    name: DM Integration Tests (Self-Hosted)
    # 此任务需要在配置了达梦数据库的自托管 runner 上运行
    # 如果没有自托管 runner，此任务将被跳过
    runs-on: self-hosted
    if: contains(github.event.head_commit.message, '[dm-integration]')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv sync --dev

    - name: Create test environment file
      run: |
        cp .env.example .env
        echo "FASTAPI_SECRET_KEY=test-secret-key-for-ci" >> .env
        echo "FASTAPI_DEBUG=False" >> .env
        echo "REDIS_URL=redis://localhost:6379" >> .env
        echo "DM_TEST_URL=${{ secrets.DM_TEST_URL }}" >> .env

    - name: Run DM integration tests
      run: |
        pipenv run pytest tests/integration/ \
          -k "dm" \
          --verbose \
          --tb=short

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dm-integration-test-results
        path: test-results/
        retention-days: 7

  dm-test-summary:
    name: DM Test Summary
    runs-on: ubuntu-latest
    needs: [dm-unit-tests, dm-property-tests]
    if: always()

    steps:
    - name: Check test results
      run: |
        echo "DM Unit Tests: ${{ needs.dm-unit-tests.result }}"
        echo "DM Property-Based Tests: ${{ needs.dm-property-tests.result }}"
        
        if [ "${{ needs.dm-unit-tests.result }}" != "success" ] || \
           [ "${{ needs.dm-property-tests.result }}" != "success" ]; then
          echo "⚠️ 部分达梦数据库测试失败"
          echo "注意：集成测试需要在配置了达梦数据库的环境中运行"
          exit 1
        fi
        
        echo "✅ 达梦数据库单元测试和属性测试通过"
